set -g mouse on

# Let shell-integration escape sequences (iTerm2 OSC 1337, OSC 7) pass through
# tmux so cmd+click and current-directory tracking work.
set -g allow-passthrough on
set -ga terminal-overrides ',*:Tc'

# Switch to previous session with Ctrl + Up
bind-key -n S-Up switch-client -p

# Switch to next session with Ctrl + Down
bind-key -n S-Down switch-client -n

# Default text color to black for high contrast on light backgrounds
set -g status-fg black

# Make the session name prominent: a reverse-video, bold block bracketed and
# flanked by dashes. status-left-length must be raised above its default of 10
# or the dashes get truncated.  set -g status-left-length 40
set -g status-left "#[reverse,bold] ----- [#S] ----- #[default] "

# Assigns each session the first palette color not already used by another
# session, so concurrent sessions are always visually distinct. The first five
# colors are maximally different hues (red, green, blue, yellow, purple); the
# rest are spares for when more than five sessions are open.
set-hook -g session-created 'run-shell " \
    COLORS=(217 157 147 229 183 159 252); \
    USED=\" \$(tmux list-sessions -F \"##{@session_color}\") \"; \
    CHOSEN=\${COLORS[0]}; \
    for c in \"\${COLORS[@]}\"; do \
        case \"\$USED\" in *\" \$c \"*) ;; *) CHOSEN=\$c; break;; esac; \
    done; \
    tmux set-option -t #{session_name} @session_color \$CHOSEN; \
    tmux set-option -t #{session_name} status-style bg=colour\$CHOSEN,fg=black"'

# tmux auto-names sessions from its monotonically increasing session id. For
# numeric session names, reuse the lowest available number instead.
set-hook -g session-created[10] 'run-shell " \
    NAME='\''#{session_name}'\''; \
    ID='\''#{session_id}'\''; \
    AUTO_NUMBER=\${ID#\\$}; \
    case \"\$NAME\" in \"\"|*[!0-9]*) exit 0 ;; esac; \
    [ \"\$NAME\" = \"\$AUTO_NUMBER\" ] || exit 0; \
    NEXT=0; \
    while tmux list-sessions -F \"##S\" | grep -qx \"\$NEXT\"; do \
        NEXT=\$((NEXT + 1)); \
    done; \
    [ \"\$NEXT\" = \"\$NAME\" ] || tmux rename-session -t \"\$ID\" \"\$NEXT\""'

#set-window-option -g aggressive-resize on

set -g window-size latest

unbind-key -T root MouseDrag1Pane
unbind-key -T root MouseDragEnd1Pane
unbind-key -T copy-mode MouseDrag1Pane
unbind-key -T copy-mode MouseDragEnd1Pane
unbind-key -T copy-mode-vi MouseDrag1Pane
unbind-key -T copy-mode-vi MouseDragEnd1Pane
unbind-key -T root MouseDown1Pane
